name: Test and Shim Checks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-with-warnings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Run tests (DeprecationWarnings visible)
        run: |
          # Fail on any DeprecationWarning
          pytest -Wd

  forbid-shim-imports:
    runs-on: ubuntu-latest
    needs: test-with-warnings
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install minimal tooling deps
        run: python -m pip install --upgrade pip
      - name: Scan for forbidden shim imports
        run: |
          python tools/check_shim_imports.py
      - name: Enforce architecture (no removed shim imports)
        run: |
          python tools/enforce_architecture.py
